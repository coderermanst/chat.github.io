<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Link Share Game</title>
    <script src="https://unpkg.com/peerjs@1.4.7/dist/peerjs.min.js"></script>
    <style>
        body { font-family: sans-serif; text-align: center; background: #f4f4f9; }
        #game-container { max-width: 600px; margin: auto; padding: 20px; }
        .link-item { background: white; margin: 10px 0; padding: 15px; border-radius: 8px; box-shadow: 0 2px 5px rgba(0,0,0,0.1); }
        .trending { color: #ff4500; font-weight: bold; }
    </style>
</head>
<body>
    <div id="game-container">
        <h1>🔗 Link Share Game</h1>
        <p>Your Peer ID: <span id="my-id">...loading...</span></p>
        
        <form id="link-form">
            <input type="text" id="link-input" placeholder="Paste a link here..." required>
            <button type="submit">Send to Peers</button>
        </form>

        <div id="lists">
            <h3>Recent Shared Links</h3>
            <div id="recent-links"></div>
            
            <h3 class="trending">🔥 Trending (Most Clicked)</h3>
            <div id="trending-links"></div>
        </div>
    </div>

    <script>
        // Core Logic will go here
    </script>
</body>
</html>

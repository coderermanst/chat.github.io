<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Global Real-Time Link Hub</title>
    <!-- Stable GunDB core module delivery -->
    <script src="https://jsdelivr.net"></script>
    <style>
        body { font-family: 'Segoe UI', sans-serif; background: #0f172a; color: #f8fafc; text-align: center; padding: 20px; margin: 0; }
        .container { max-width: 600px; margin: auto; padding: 10px; }
        .info-bar { background: #1e293b; padding: 12px; border-radius: 8px; margin-bottom: 20px; border: 1px solid #334155; font-size: 0.9rem; color: #38bdf8; }
        .debug-panel { background: #3b0712; border: 1px solid #7f1d1d; color: #fca5a5; padding: 10px; border-radius: 6px; margin-bottom: 15px; font-size: 0.85rem; text-align: left; display: none; }
        form { margin: 20px 0; display: flex; gap: 10px; }
        input { flex: 1; padding: 12px; border: none; border-radius: 6px; background: #1e293b; color: white; border: 1px solid #475569; font-size: 1rem; }
        button { padding: 12px 20px; border: none; border-radius: 6px; background: #3b82f6; color: white; font-weight: bold; cursor: pointer; font-size: 1rem; white-space: nowrap; }
        button:hover { background: #2563eb; }
        .section { background: #1e293b; padding: 20px; border-radius: 12px; margin-bottom: 20px; text-align: left; }
        .link-item { background: #334155; padding: 12px; margin: 8px 0; border-radius: 6px; display: flex; justify-content: space-between; align-items: center; gap: 10px; }
        .link-url { color: #38bdf8; text-decoration: none; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; max-width: 70%; cursor: pointer; }
        .link-url:hover { text-decoration: underline; }
        .clicks { background: #475569; padding: 4px 8px; border-radius: 4px; font-size: 0.85rem; white-space: nowrap; }
    </style>
</head>
<body>
    <div class="container">
        <h1>🔗 Global Link Share Hub</h1>
        <div id="status-bar" class="info-bar">📡 Initializing Peer Relay Network...</div>
        <div id="debug" class="debug-panel"></div>

        <form id="link-form">
            <input type="url" id="link-input" placeholder="https://example.com" required maxlength="500">
            <button type="submit">Share Link</button>
        </form>

        <div class="section">
            <h2 style="color: #f43f5e; margin-top:0;">🔥 Global Trending (Most Clicked)</h2>
            <div id="trending-links">No trending links yet.</div>
        </div>

        <div class="section">
            <h2 style="color: #38bdf8; margin-top:0;">⏱️ Recently Shared</h2>
            <div id="recent-links">No links shared yet.</div>
        </div>
    </div>

    <script>
        // Check if running on local desktop file system instead of a server
        if (window.location.protocol === 'file:') {
            const dbg = document.getElementById('debug');
            dbg.innerHTML = "⚠️ <strong>Running via Local File Context:</strong> Browsers often block network sync routines on raw files. To make updates live, run this using an IDE Live Server tool or host it online.";
            dbg.style.display = "block";
        }

        // Bugfix: Swapped out dead Heroku server nodes for active, high-availability GunDB relays
        const reliablePeers = [
            'https://wall.org',
            'https://gun-us.herokuapp.com/gun',
            'https://gun-eu.herokuapp.com/gun'
        ];
        
        const gun = Gun({ peers: reliablePeers });
        // Using a fresh schema block path identifier to isolate network state mutations
        const linksDB = gun.get('global-linkshare-production-v9');

        let localState = {};
        let debounceTimer;

        document.getElementById('status-bar').innerText = "🟢 Connected to Decentralized Network Mesh Node Channels.";

        function escapeHTML(str) {
            return str.replace(/[&<>'"]/g, 
                tag => ({ '&': '&amp;', '<': '&lt;', '>': '&gt;', "'": '&#39;', '"': '&quot;' }[tag] || tag)
            );
        }

        // 1. INPUT DATA INTERCEPTION STREAM
        linksDB.map().on((data, key) => {
            // Filter invalid transmissions or dead nodes out of memory processing pipelines
            if (!data || !data.url) return;

            localState[key] = {
                id: key,
                url: String(data.url),
                clicks: parseInt(data.clicks) || 0,
                timestamp: parseInt(data.timestamp) || Date.now()
            };

            clearTimeout(debounceTimer);
            debounceTimer = setTimeout(updateUI, 30);
        });

        // 2. SUBMISSION DISPATCH LOGIC
        document.getElementById('link-form').onsubmit = (e) => {
            e.preventDefault();
            const urlInput = document.getElementById('link-input');
            let url = urlInput.value.trim();

            if (!/^https?:\/\//i.test(url)) {
                url = 'https://' + url;
            }

            const itemKey = 'link_' + Date.now() + '_' + Math.random().toString(36).substr(2, 9);

            // Push state record seamlessly onto the network structure map
            linksDB.get(itemKey).put({
                url: url,
                clicks: 0,
                timestamp: Date.now()
            }, (ack) => {
                if (ack.err) {
                    document.getElementById('debug').innerText = "Network Error: " + ack.err;
                    document.getElementById('debug').style.display = "block";
                }
            });

            urlInput.value = '';
        };

        // 3. SEPARATED ASYNC RENDERING ENGINE
        function registerGlobalClick(key, url) {
            const currentItem = localState[key];
            if (!currentItem) return;

            linksDB.get(key).put({ clicks: currentItem.clicks + 1 });
            window.open(url, '_blank', 'noopener,noreferrer');
        }

        // 4. CLEAN UI DOM INJECTION RECONSTRUCTION
        function updateUI() {
            const linksArray = Object.values(localState);

            const recentLinks = [...linksArray]
                .sort((a, b) => b.timestamp - a.timestamp)
                .slice(0, 10);

            const trendingLinks = [...linksArray]
                .sort((a, b) => b.clicks - a.clicks)
                .slice(0, 5);

            const recentDiv = document.getElementById('recent-links');
            recentDiv.innerHTML = recentLinks.map(item => {
                const cleanUrl = escapeHTML(item.url);
                return `
                    <div class="link-item">
                        <span class="link-url" onclick="registerGlobalClick('${item.id}', '${cleanUrl}')">${cleanUrl}</span>
                        <span class="clicks">🔥 ${item.clicks} clicks</span>
                    </div>
                `;
            }).join('') || "<p>No links shared yet.</p>";

            const trendingDiv = document.getElementById('trending-links');
            trendingDiv.innerHTML = trendingLinks.map(item => {
                const cleanUrl = escapeHTML(item.url);
                return `
                    <div class="link-item">
                        <span class="link-url" onclick="registerGlobalClick('${item.id}', '${cleanUrl}')">${cleanUrl}</span>
                        <span class="clicks">🔥 ${item.clicks} clicks</span>
                    </div>
                `;
            }).join('') || "<p>No trending links yet.</p>";
        }
    </script>
</body>
</html>

</html>
